<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caregiver Companion</title>
  <style>
:root {
  --bg: #f8f6ff;
  --card: #ffffff;
  --primary: #5b35b1;
  --primary-dark: #21114d;
  --soft-purple: #eee7ff;
  --soft-green: #eaf8ef;
  --text: #1e1633;
  --muted: #6d6580;
  --border: #ddd7f0;
  --danger: #d9534f;
  --warning: #b86b00;
  --shadow: 0 10px 25px rgba(42, 25, 87, 0.08);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px;
  background: linear-gradient(180deg, var(--primary-dark), #120a2e);
  color: white;
  padding: 24px 18px;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  overflow-y: auto;
}

.brand {
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 28px;
  line-height: 1.2;
}

.nav button {
  width: 100%;
  border: none;
  background: transparent;
  color: white;
  text-align: left;
  padding: 13px 14px;
  border-radius: 12px;
  font-size: 0.98rem;
  cursor: pointer;
  margin-bottom: 6px;
}

.nav button.active,
.nav button:hover { background: rgba(255, 255, 255, 0.16); }

.main {
  margin-left: 260px;
  padding: 28px;
  width: calc(100% - 260px);
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  margin-bottom: 22px;
}

.title h1 { margin: 0; font-size: 2rem; }
.title p { margin: 6px 0 0; color: var(--muted); }

.status-card,
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
}

.status-card {
  padding: 16px 20px;
  min-width: 180px;
  text-align: center;
}

.section {
  padding: 20px;
  margin-bottom: 20px;
}

.section h2 {
  margin-top: 0;
  font-size: 1.1rem;
  color: var(--primary);
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(8, minmax(110px, 1fr));
  gap: 12px;
}

.summary-card {
  background: #fafaff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 10px;
  text-align: center;
}

.summary-card .icon {
  font-size: 2rem;
  display: block;
  margin-bottom: 8px;
}

.summary-card strong {
  display: block;
  font-size: 1.35rem;
  color: var(--primary-dark);
}

.summary-card span {
  font-size: 0.9rem;
  color: var(--muted);
}

.quick-log {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.quick-group {
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  background: #fff;
}

.quick-group h3 {
  margin: 0 0 10px;
  font-size: 1rem;
  color: var(--primary-dark);
}

.quick-buttons,
.favorite-wrap,
.checkbox-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

button,
.primary-btn,
.pill-btn { font: inherit; }

.quick-buttons button,
.primary-btn,
.pill-btn,
.favorite-chip {
  border: 1px solid var(--border);
  background: linear-gradient(180deg, #fff, var(--soft-purple));
  color: var(--primary);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 0.95rem;
  font-weight: bold;
  cursor: pointer;
}

.favorite-chip {
  background: var(--soft-green);
  color: var(--primary-dark);
  border-radius: 999px;
  padding: 8px 12px;
}

.quick-buttons button:hover,
.primary-btn:hover,
.pill-btn:hover,
.favorite-chip:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.timeline-item {
  display: grid;
  grid-template-columns: 90px 40px 1fr auto;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  background: #fff;
}

.timeline-time {
  font-weight: bold;
  font-size: 0.9rem;
}

.timeline-icon {
  font-size: 1.3rem;
  text-align: center;
}

.delete-btn {
  border: none;
  background: transparent;
  color: var(--danger);
  cursor: pointer;
  font-size: 1rem;
}

.empty {
  color: var(--muted);
  padding: 16px;
  text-align: center;
  border: 1px dashed var(--border);
  border-radius: 14px;
}

.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(16, 10, 35, 0.45);
  align-items: center;
  justify-content: center;
  z-index: 10;
  padding: 18px;
}

.modal-backdrop.show { display: flex; }

.modal {
  width: min(820px, 100%);
  max-height: 90vh;
  overflow: auto;
  background: white;
  border-radius: 22px;
  padding: 22px;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 12px;
}

.modal-header h2 {
  margin: 0;
  color: var(--primary);
}

.close-btn {
  border: none;
  background: var(--soft-purple);
  color: var(--primary);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 1.2rem;
}

label {
  display: block;
  font-weight: bold;
  margin-top: 14px;
  margin-bottom: 6px;
}

input,
select,
textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font: inherit;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

.checkbox-grid label {
  width: calc(50% - 8px);
  font-weight: normal;
  margin: 0;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #fff;
}

.checkbox-grid input {
  width: auto;
  margin-right: 6px;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.mini-summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 16px;
}

.mini-card {
  background: var(--soft-purple);
  border-radius: 16px;
  padding: 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.mini-card strong {
  display: block;
  font-size: 1.3rem;
  color: var(--primary-dark);
}

.mini-card span {
  color: var(--muted);
  font-size: 0.9rem;
}

.progress-shell {
  background: #efeaf9;
  border-radius: 999px;
  overflow: hidden;
  height: 14px;
  margin: 10px 0 4px;
}

.progress-fill {
  height: 100%;
  background: var(--primary);
  width: 0%;
  transition: width 0.2s ease;
}

.favorite-list {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

.favorite-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
}

.warning-text { color: var(--warning); font-weight: bold; }

.floating-add {
  position: fixed;
  right: 28px;
  bottom: 28px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 2.4rem;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(91, 53, 177, 0.4);
}

.mobile-menu-btn {
  display: none;
  border: none;
  background: var(--primary);
  color: white;
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 1.2rem;
}

@media (max-width: 1050px) {
  .summary-grid { grid-template-columns: repeat(4, 1fr); }
  .quick-log { grid-template-columns: 1fr; }
  .mini-summary-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 800px) {
  .sidebar {
    transform: translateX(-100%);
    transition: 0.25s ease;
    z-index: 20;
  }

  .sidebar.open { transform: translateX(0); }

  .main {
    margin-left: 0;
    width: 100%;
    padding: 18px;
  }

  .mobile-menu-btn { display: inline-block; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }

  .timeline-item { grid-template-columns: 74px 32px 1fr auto; }

  .form-row,
  .mini-summary-grid {
    grid-template-columns: 1fr;
  }

  .checkbox-grid label { width: 100%; }
}


/* Medication dashboard status card */
.med-summary-card strong {
  font-size: 1rem;
}

.med-summary-card span:last-child {
  display: block;
  line-height: 1.35;
}

.med-due-soon {
  background: #fff7e6;
  border-color: #f4c86a;
}

.med-overdue {
  background: #fff0f0;
  border-color: #e08b8b;
}


/* Supplies module */
.supplies-summary-card strong {
  font-size: 1rem;
}

.supplies-low {
  background: #fff7e6;
  border-color: #f4c86a;
}

.supplies-critical {
  background: #fff0f0;
  border-color: #e08b8b;
}

.supply-list,
.purchase-list,
.wishlist-list {
  display: grid;
  gap: 10px;
}

.supply-item,
.purchase-item,
.wishlist-item {
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 14px;
  padding: 12px;
}

.supply-item-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.supply-item h3 {
  margin: 0;
  color: var(--primary-dark);
}

.supply-meta {
  color: var(--muted);
  font-size: 0.92rem;
  margin-top: 4px;
}

.supply-status {
  font-weight: bold;
  border-radius: 999px;
  padding: 6px 10px;
  white-space: nowrap;
}

.status-ok {
  background: var(--soft-green);
  color: #286044;
}

.status-low {
  background: #fff7e6;
  color: #9a5a00;
}

.status-critical {
  background: #fff0f0;
  color: #a33d3d;
}

.qty-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.qty-controls button {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--soft-purple);
  color: var(--primary);
  font-weight: bold;
  padding: 8px 10px;
  cursor: pointer;
}

.wishlist-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
}

.wishlist-item input {
  width: auto;
}

.completed-wishlist {
  opacity: 0.6;
  text-decoration: line-through;
}

  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">

      <nav class="nav">

  <script>
const STORAGE_KEY = "caregiverCompanion_v08";
const FAVORITES_KEY = "caregiverCompanion_foodFavorites_v08";

const SUPPLIES_KEY = "caregiverCompanion_supplies_v08";
const PURCHASES_KEY = "caregiverCompanion_purchases_v08";
const WISHLIST_KEY = "caregiverCompanion_wishlist_v08";

let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

let supplies = JSON.parse(localStorage.getItem(SUPPLIES_KEY)) || [
  { id: crypto.randomUUID(), name: "Enemas", category: "Medical", quantity: 4, lowAt: 6, notes: "" },
  { id: crypto.randomUUID(), name: "Gloves", category: "Medical", quantity: 8, lowAt: 4, notes: "" },
  { id: crypto.randomUUID(), name: "Diapers", category: "Diapering", quantity: 24, lowAt: 10, notes: "" },
  { id: crypto.randomUUID(), name: "Diaper Pail Refills", category: "Diapering", quantity: 1, lowAt: 2, notes: "" },
  { id: crypto.randomUUID(), name: "Bottle Nipples", category: "Feeding", quantity: 3, lowAt: 2, notes: "" }
];

let purchases = JSON.parse(localStorage.getItem(PURCHASES_KEY)) || [];
let wishlist = JSON.parse(localStorage.getItem(WISHLIST_KEY)) || [
  { id: crypto.randomUUID(), text: "Backup thermometer", completed: false },
  { id: crypto.randomUUID(), text: "Diaper pail refills", completed: false },
  { id: crypto.randomUUID(), text: "Extra pajamas", completed: false }
];

let foodFavorites = JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [
  "Applesauce",
  "Yogurt",
  "Oatmeal",
  "Mashed Potatoes",
  "Pudding"
];

const icons = {
  wake: "☀️",
  shake: "🍼",
  water: "💧",
  pee: "💦",
  poopy: "💩",
  food: "🍎",
  position: "🔄",
  walk: "🚶",
  exercise: "🏋️",
  teeth_morning: "🪥",
  teeth_evening: "🪥",
  full_bath: "🚿",
  sponge_bath: "🛁",
  nails: "✂️",
  haircut: "💇",
  medication: "💊",
  temperature: "🌡",
  health: "🤒",
  note: "📝",
  mood: "😊"
};

const labels = {
  wake: "Wake Up",
  shake: "Shake",
  water: "Water",
  pee: "Pee Diaper",
  poopy: "Poopy Diaper",
  food: "Food",
  position: "Position Change",
  walk: "Walk",
  exercise: "Exercise",
  teeth_morning: "Morning Teeth Brushed",
  teeth_evening: "Evening Teeth Brushed",
  full_bath: "Full Bath",
  sponge_bath: "Sponge Bath",
  nails: "Nails Clipped",
  haircut: "Hair Cut",
  medication: "Medication",
  temperature: "Temperature",
  health: "Health Log",
  note: "Note",
  mood: "Mood"
};

const symptoms = [
  "Cough",
  "Congestion",
  "Runny Nose",
  "Fever",
  "Vomiting",
  "Diarrhea",
  "Constipation",
  "Low Appetite",
  "Trouble Sleeping",
  "Fatigue",
  "Fussy",
  "Other"
];

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function saveFavorites() {
  localStorage.setItem(FAVORITES_KEY, JSON.stringify(foodFavorites));
}

function saveSupplies() {
  localStorage.setItem(SUPPLIES_KEY, JSON.stringify(supplies));
}

function savePurchases() {
  localStorage.setItem(PURCHASES_KEY, JSON.stringify(purchases));
}

function saveWishlist() {
  localStorage.setItem(WISHLIST_KEY, JSON.stringify(wishlist));
}

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function isToday(entry) {
  return entry.timestamp.slice(0, 10) === todayKey();
}

function todayEntries() {
  return entries
    .filter(isToday)
    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
}

function timeLabel(timestamp) {
  return new Date(timestamp).toLocaleTimeString([], {
    hour: "numeric",
    minute: "2-digit"
  });
}

function dateShort(timestamp) {
  return new Date(timestamp).toLocaleDateString([], {
    month: "short",
    day: "numeric"
  });
}

function dateLabel() {
  const today = new Date();
  document.getElementById("todayDate").textContent =
    today.toLocaleDateString([], {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric"
    });
}

function countToday(type) {
  return todayEntries().filter(entry => entry.type === type).length;
}

function hasToday(type) {
  return todayEntries().some(entry => entry.type === type);
}

function latestToday(type) {
  return [...todayEntries()].reverse().find(entry => entry.type === type);
}

function latestEver(type) {
  return [...entries]
    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
    .reverse()
    .find(entry => entry.type === type);
}

function firstToday(type) {
  return todayEntries().find(entry => entry.type === type);
}

function diaperEntries() {
  return todayEntries().filter(entry => ["pee", "poopy"].includes(entry.type));
}

function feedingEntries() {
  return todayEntries().filter(entry => ["wake", "shake", "water", "food"].includes(entry.type));
}

function hygieneEntries() {
  return todayEntries().filter(entry =>
    ["teeth_morning", "teeth_evening", "full_bath", "sponge_bath", "nails", "haircut"].includes(entry.type)
  );
}

function activityEntries() {
  return todayEntries().filter(entry => ["position", "walk", "exercise"].includes(entry.type));
}

function healthEntries() {
  return todayEntries().filter(entry => ["temperature", "health", "medication"].includes(entry.type));
}

function activityMinutesToday() {
  return activityEntries().reduce((total, entry) => total + (Number(entry.duration) || 0), 0);
}

function quickAdd(type, details = "", extra = {}) {
  entries.push({
    id: crypto.randomUUID(),
    type,
    details,
    timestamp: new Date().toISOString(),
    ...extra
  });

  save();
  render();

  if (document.getElementById("modalBackdrop").classList.contains("show")) {
    refreshOpenModal();
  }
}

function saveManualTimedEntry(type, timeInput, details = "", extra = {}) {
  const today = new Date();
  const [hours, minutes] = timeInput.split(":");

function nextMedicationDue() {
  const now = new Date();

  const meds = entries
    .filter(entry => entry.type === "medication" && entry.nextDue)
    .map(entry => ({ ...entry, dueDate: new Date(entry.nextDue) }))
    .filter(entry => !isNaN(entry.dueDate))
    .sort((a, b) => a.dueDate - b.dueDate);

  return meds.find(entry => entry.dueDate >= now) || meds[meds.length - 1] || null;
}

function nextMedDashboardData() {
  const med = nextMedicationDue();

  if (!med) {
    return {
      status: "—",
      details: "Next Med",
      cardClass: ""
    };
  }

  const dueDate = new Date(med.nextDue);
  const now = new Date();
  const minutesUntilDue = Math.round((dueDate - now) / 60000);

  let status = "Next Med";
  let cardClass = "";

  if (minutesUntilDue < 0) {
    status = "Overdue";
    cardClass = "med-overdue";
  } else if (minutesUntilDue <= 30) {
    status = "Due Soon";
    cardClass = "med-due-soon";
  }

  return {
    status,
    details: `${med.medName || "Medication"}${med.dose ? "<br>" + med.dose : ""}<br>Due ${timeLabel(med.nextDue)}`,
    cardClass
  };
}

  const dose = document.getElementById("medDoseInput").value.trim();
  const timeInput = document.getElementById("medTimeInput").value;
  const repeatHours = document.getElementById("medRepeatInput").value;
  const notes = document.getElementById("medNotesInput").value.trim();

  if (!medName || !timeInput) return;

  const given = new Date();
  const [hours, minutes] = timeInput.split(":");

  given.setHours(Number(hours));
  given.setMinutes(Number(minutes));
  given.setSeconds(0);
  given.setMilliseconds(0);

  let nextDue = "";
  if (repeatHours) {
    const due = new Date(given);
    due.setHours(due.getHours() + Number(repeatHours));
    nextDue = due.toISOString();
  }

  const parts = [];
  if (dose) parts.push(dose);
  if (nextDue) parts.push(`Next due ${timeLabel(nextDue)}`);
  if (notes) parts.push(notes);

  entries.push({
    id: crypto.randomUUID(),
    type: "medication",
    medName,
    dose,
    repeatHours,
    nextDue,
    notes,
    details: `${medName}${parts.length ? " — " + parts.join(" — ") : ""}`,
    timestamp: given.toISOString()
  });

  save();
  render();
  openModal("health");
}


function supplyStatus(item) {
  const qty = Number(item.quantity) || 0;
  const lowAt = Number(item.lowAt) || 0;

  if (lowAt > 0 && qty <= Math.max(1, Math.floor(lowAt / 2))) {
    return { label: "Critical", className: "status-critical" };
  }

  if (lowAt > 0 && qty <= lowAt) {
    return { label: "Low", className: "status-low" };
  }

  return { label: "OK", className: "status-ok" };
}

function lowSupplies() {
  return supplies.filter(item => {
    const qty = Number(item.quantity) || 0;
    const lowAt = Number(item.lowAt) || 0;
    return lowAt > 0 && qty <= lowAt;
  });
}

function criticalSupplies() {
  return supplies.filter(item => {
    const qty = Number(item.quantity) || 0;
    const lowAt = Number(item.lowAt) || 0;
    return lowAt > 0 && qty <= Math.max(1, Math.floor(lowAt / 2));
  });
}

function renderSuppliesDashboard() {
  const card = document.getElementById("suppliesCard");
  const statusEl = document.getElementById("suppliesStatus");
  const detailsEl = document.getElementById("suppliesDetails");

  if (!card || !statusEl || !detailsEl) return;

  const low = lowSupplies().length;
  const critical = criticalSupplies().length;

  card.classList.remove("supplies-low", "supplies-critical");

  if (critical > 0) {
    statusEl.textContent = `${critical} Critical`;
    detailsEl.textContent = "Supplies";
    card.classList.add("supplies-critical");
  } else if (low > 0) {
    statusEl.textContent = `${low} Low`;
    detailsEl.textContent = "Supplies";
    card.classList.add("supplies-low");
  } else {
    statusEl.textContent = "OK";
    detailsEl.textContent = "Supplies";
  }
}

}

  const category = document.getElementById("supplyCategoryInput").value;
  const quantity = Number(document.getElementById("supplyQuantityInput").value) || 0;
  const lowAt = Number(document.getElementById("supplyLowAtInput").value) || 0;
  const notes = document.getElementById("supplyNotesInput").value.trim();

  if (!name) return;

  supplies.push({
    id: crypto.randomUUID(),
    name,
    category,
    quantity,
    lowAt,
    notes
  });

  saveSupplies();
  render();
  openModal("supplies");
}

function adjustSupplyQty(id, amount) {
  supplies = supplies.map(item => {
    if (item.id !== id) return item;

    return {
      ...item,
      quantity: Math.max(0, (Number(item.quantity) || 0) + amount)
    };
  });

  saveSupplies();
  render();
  openModal("supplies");
}

function deleteSupplyItem(id) {
  if (!confirm("Delete this supply item?")) return;

  supplies = supplies.filter(item => item.id !== id);
  saveSupplies();
  render();
  openModal("supplies");
}

function recordPurchase() {
  const itemId = document.getElementById("purchaseItemInput").value;
  const quantity = Number(document.getElementById("purchaseQtyInput").value) || 0;
  const store = document.getElementById("purchaseStoreInput").value.trim();
  const cost = document.getElementById("purchaseCostInput").value.trim();

  if (!itemId || quantity <= 0) return;

  const item = supplies.find(supply => supply.id === itemId);
  if (!item) return;

  supplies = supplies.map(supply => {
    if (supply.id !== itemId) return supply;

    return {
      ...supply,
      quantity: (Number(supply.quantity) || 0) + quantity
    };
  });

  purchases.push({
    id: crypto.randomUUID(),
    itemId,
    itemName: item.name,
    quantity,
    store,
    cost,
    timestamp: new Date().toISOString()
  });

  saveSupplies();
  savePurchases();
  render();
  openModal("supplies");
}

function addWishlistItem() {
  const input = document.getElementById("wishlistInput");
  const text = input.value.trim();

  if (!text) return;

  wishlist.push({
    id: crypto.randomUUID(),
    text,
    completed: false
  });

  saveWishlist();
  render();
  openModal("supplies");
}

function toggleWishlistItem(id) {
  wishlist = wishlist.map(item => {
    if (item.id !== id) return item;
    return { ...item, completed: !item.completed };
  });

  saveWishlist();
  render();
  openModal("supplies");
}

function deleteWishlistItem(id) {
  wishlist = wishlist.filter(item => item.id !== id);
  saveWishlist();
  render();
  openModal("supplies");
}

function foodFormHTML() {
  return `
    <label for="foodInput">Food Given</label>

      ${foodFavorites.map(food => `<button class="favorite-chip" onclick="setFoodFavorite('${escapeJS(food)}')">${food}</button>`).join("")}
    </div>
    <label for="foodNotes">Notes</label>

    <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
    <button class="pill-btn" onclick="openModal('foodFavorites')">⚙️ Edit Favorite Foods</button>
  `;
}

function setFoodFavorite(food) {
  document.getElementById("foodInput").value = food;
}

function saveFood() {
  const food = document.getElementById("foodInput").value.trim();
  const notes = document.getElementById("foodNotes").value.trim();

  if (!food) return;

  entries.push({
    id: crypto.randomUUID(),
    type: "food",
    food,
    details: notes ? `${food} — ${notes}` : food,
    notes,
    timestamp: new Date().toISOString()
  });

  save();
  render();
  openModal("feeding");
}

function foodFavoritesHTML() {
  return `
    <label for="newFavoriteInput">Add Favorite Food</label>
    <input id="newFavoriteInput" placeholder="Example: Scrambled eggs" />
    <button class="primary-btn" style="margin-top:12px;" onclick="addFoodFavorite()">Add Favorite</button>
    <div class="favorite-list">
      ${foodFavorites.length ? foodFavorites.map((food, index) => `
        <div class="favorite-row">
          <strong>${food}</strong>
          <button class="delete-btn" onclick="deleteFoodFavorite(${index})">×</button>
        </div>`).join("") : `<div class="empty">No favorite foods yet.</div>`}
    </div>
    <button class="pill-btn" style="margin-top:16px;" onclick="openModal('food')">Back to Food Entry</button>
  `;
}

function addFoodFavorite() {
  const input = document.getElementById("newFavoriteInput");
  const value = input.value.trim();

  if (!value) return;

  foodFavorites.push(value);
  saveFavorites();
  openModal("foodFavorites");
}

function deleteFoodFavorite(index) {
  foodFavorites.splice(index, 1);
  saveFavorites();
  openModal("foodFavorites");
}

      <option>Tired</option>
      <option>Sick</option>

    <button class="primary-btn" style="margin-top:14px;" onclick="saveNote()">Save</button>
  `;
}

function saveNote() {
  const note = document.getElementById("noteInput").value.trim();
  const mood = document.getElementById("moodInput").value;

  if (note) quickAdd("note", note);
  if (mood) quickAdd("mood", mood);

  closeModal();
}

function clearAllData() {
  if (!confirm("Clear all saved caregiver entries on this device?")) return;
  entries = [];
  save();
  render();
  closeModal();
}

function escapeJS(str) {
  return String(str)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'");
}
