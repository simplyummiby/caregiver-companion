<!--
Caregiver Companion
Version: 0.8.4
Date: June 16, 2026
Changes:
- Added Care Routines for Miralax and Enemas
- Added dashboard cards for Miralax daily goal and Enema weekly goal
- Updated quick-add button labels to use + before the action name
- Kept CSS inside index.html and JavaScript in app.js
- Built Supplies & Inventory module
- Added dashboard supplies status card
- Added inventory items with low-stock warnings
- Added quantity +/- controls
- Added purchase log that updates inventory
- Added wishlist checklist
Previous Version: v0.8.3 supplies custom purchase upgrade
Risk: Local storage only. No cloud sync, auth, database, or HIPAA-related features yet.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caregiver Companion</title>
  <style>
:root {
  --bg: #f8f6ff;
  --card: #ffffff;
  --primary: #5b35b1;
  --primary-dark: #21114d;
  --soft-purple: #eee7ff;
  --soft-green: #eaf8ef;
  --text: #1e1633;
  --muted: #6d6580;
  --border: #ddd7f0;
  --danger: #d9534f;
  --warning: #b86b00;
  --shadow: 0 10px 25px rgba(42, 25, 87, 0.08);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px;
  background: linear-gradient(180deg, var(--primary-dark), #120a2e);
  color: white;
  padding: 24px 18px;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  overflow-y: auto;
}

.brand {
  font-size: 1.5rem;
  font-weight: bold;
  margin-bottom: 28px;
  line-height: 1.2;
}

.nav button {
  width: 100%;
  border: none;
  background: transparent;
  color: white;
  text-align: left;
  padding: 13px 14px;
  border-radius: 12px;
  font-size: 0.98rem;
  cursor: pointer;
  margin-bottom: 6px;
}

.nav button.active,
.nav button:hover { background: rgba(255, 255, 255, 0.16); }

.main {
  margin-left: 260px;
  padding: 28px;
  width: calc(100% - 260px);
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  margin-bottom: 22px;
}

.title h1 { margin: 0; font-size: 2rem; }
.title p { margin: 6px 0 0; color: var(--muted); }

.status-card,
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
}

.status-card {
  padding: 16px 20px;
  min-width: 180px;
  text-align: center;
}

.section {
  padding: 20px;
  margin-bottom: 20px;
}

.section h2 {
  margin-top: 0;
  font-size: 1.1rem;
  color: var(--primary);
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(8, minmax(110px, 1fr));
  gap: 12px;
}

.summary-card {
  background: #fafaff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 10px;
  text-align: center;
}

.summary-card .icon {
  font-size: 2rem;
  display: block;
  margin-bottom: 8px;
}

.summary-card strong {
  display: block;
  font-size: 1.35rem;
  color: var(--primary-dark);
}

.summary-card span {
  font-size: 0.9rem;
  color: var(--muted);
}

.quick-log {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.quick-group {
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  background: #fff;
}

.quick-group h3 {
  margin: 0 0 10px;
  font-size: 1rem;
  color: var(--primary-dark);
}

.quick-buttons,
.favorite-wrap,
.checkbox-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

button,
.primary-btn,
.pill-btn { font: inherit; }

.quick-buttons button,
.primary-btn,
.pill-btn,
.favorite-chip {
  border: 1px solid var(--border);
  background: linear-gradient(180deg, #fff, var(--soft-purple));
  color: var(--primary);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 0.95rem;
  font-weight: bold;
  cursor: pointer;
}

.favorite-chip {
  background: var(--soft-green);
  color: var(--primary-dark);
  border-radius: 999px;
  padding: 8px 12px;
}

.quick-buttons button:hover,
.primary-btn:hover,
.pill-btn:hover,
.favorite-chip:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.timeline-item {
  display: grid;
  grid-template-columns: 90px 40px 1fr auto;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  background: #fff;
}

.timeline-time {
  font-weight: bold;
  font-size: 0.9rem;
}

.timeline-icon {
  font-size: 1.3rem;
  text-align: center;
}

.delete-btn {
  border: none;
  background: transparent;
  color: var(--danger);
  cursor: pointer;
  font-size: 1rem;
}

.empty {
  color: var(--muted);
  padding: 16px;
  text-align: center;
  border: 1px dashed var(--border);
  border-radius: 14px;
}

.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(16, 10, 35, 0.45);
  align-items: center;
  justify-content: center;
  z-index: 10;
  padding: 18px;
}

.modal-backdrop.show { display: flex; }

.modal {
  width: min(820px, 100%);
  max-height: 90vh;
  overflow: auto;
  background: white;
  border-radius: 22px;
  padding: 22px;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 12px;
}

.modal-header h2 {
  margin: 0;
  color: var(--primary);
}

.close-btn {
  border: none;
  background: var(--soft-purple);
  color: var(--primary);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 1.2rem;
}

label {
  display: block;
  font-weight: bold;
  margin-top: 14px;
  margin-bottom: 6px;
}

input,
select,
textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font: inherit;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

.checkbox-grid label {
  width: calc(50% - 8px);
  font-weight: normal;
  margin: 0;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #fff;
}

.checkbox-grid input {
  width: auto;
  margin-right: 6px;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.mini-summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 16px;
}

.mini-card {
  background: var(--soft-purple);
  border-radius: 16px;
  padding: 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.mini-card strong {
  display: block;
  font-size: 1.3rem;
  color: var(--primary-dark);
}

.mini-card span {
  color: var(--muted);
  font-size: 0.9rem;
}

.progress-shell {
  background: #efeaf9;
  border-radius: 999px;
  overflow: hidden;
  height: 14px;
  margin: 10px 0 4px;
}

.progress-fill {
  height: 100%;
  background: var(--primary);
  width: 0%;
  transition: width 0.2s ease;
}

.favorite-list {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

.favorite-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
}

.warning-text { color: var(--warning); font-weight: bold; }

.floating-add {
  position: fixed;
  right: 28px;
  bottom: 28px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 2.4rem;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(91, 53, 177, 0.4);
}

.mobile-menu-btn {
  display: none;
  border: none;
  background: var(--primary);
  color: white;
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 1.2rem;
}

@media (max-width: 1050px) {
  .summary-grid { grid-template-columns: repeat(4, 1fr); }
  .quick-log { grid-template-columns: 1fr; }
  .mini-summary-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 800px) {
  .sidebar {
    transform: translateX(-100%);
    transition: 0.25s ease;
    z-index: 20;
  }

  .sidebar.open { transform: translateX(0); }

  .main {
    margin-left: 0;
    width: 100%;
    padding: 18px;
  }

  .mobile-menu-btn { display: inline-block; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }

  .timeline-item { grid-template-columns: 74px 32px 1fr auto; }

  .form-row,
  .mini-summary-grid {
    grid-template-columns: 1fr;
  }

  .checkbox-grid label { width: 100%; }
}


/* Medication dashboard status card */
.med-summary-card strong {
  font-size: 1rem;
}

.med-summary-card span:last-child {
  display: block;
  line-height: 1.35;
}

.med-due-soon {
  background: #fff7e6;
  border-color: #f4c86a;
}

.med-overdue {
  background: #fff0f0;
  border-color: #e08b8b;
}


/* Supplies module */
.supplies-summary-card strong {
  font-size: 1rem;
}

.supplies-low {
  background: #fff7e6;
  border-color: #f4c86a;
}

.supplies-critical {
  background: #fff0f0;
  border-color: #e08b8b;
}

.supply-list,
.purchase-list,
.wishlist-list {
  display: grid;
  gap: 10px;
}

.supply-item,
.purchase-item,
.wishlist-item {
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 14px;
  padding: 12px;
}

.supply-item-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.supply-item h3 {
  margin: 0;
  color: var(--primary-dark);
}

.supply-meta {
  color: var(--muted);
  font-size: 0.92rem;
  margin-top: 4px;
}

.supply-status {
  font-weight: bold;
  border-radius: 999px;
  padding: 6px 10px;
  white-space: nowrap;
}

.status-ok {
  background: var(--soft-green);
  color: #286044;
}

.status-low {
  background: #fff7e6;
  color: #9a5a00;
}

.status-critical {
  background: #fff0f0;
  color: #a33d3d;
}

.qty-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.qty-controls button {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--soft-purple);
  color: var(--primary);
  font-weight: bold;
  padding: 8px 10px;
  cursor: pointer;
}

.wishlist-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
}

.wishlist-item input {
  width: auto;
}

.completed-wishlist {
  opacity: 0.6;
  text-decoration: line-through;
}

  
.product-link,
.supply-meta a,
.purchase-item a {
  color: var(--primary);
  font-weight: bold;
}

  
/* Care routine dashboard cards */
.routine-summary-card strong {
  font-size: 1rem;
}

.routine-good {
  background: var(--soft-green);
  border-color: #9fd5b5;
}

.routine-warning {
  background: #fff7e6;
  border-color: #f4c86a;
}

.routine-alert {
  background: #fff0f0;
  border-color: #e08b8b;
}

  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">💜 Caregiver<br>Companion</div>

      <nav class="nav">
        <button class="active" onclick="openModal('today')">🏠 Today</button>
        <button onclick="openModal('feeding')">🍼 Feeding & Hydration</button>
        <button onclick="openModal('diapers')">💩 Diapers</button>
        <button onclick="openModal('hygiene')">🪥 Hygiene</button>
        <button onclick="openModal('food')">🍎 Food Log</button>
        <button onclick="openModal('activity')">🚶 Activity & Positioning</button>
        <button onclick="openModal('health')">🌡 Health & Meds</button>
        <button onclick="openModal('appointments')">📅 Appointments</button>
        <button onclick="openModal('supplies')">📦 Supplies</button>
        <button onclick="openModal('notes')">📝 Concerns & Notes</button>
        <button onclick="openModal('contacts')">☎️ Contacts</button>
        <button onclick="openModal('reports')">📊 Reports</button>
        <button onclick="openModal('settings')">⚙️ Settings</button>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

        <div class="title">
          <h1>Muhammad 💜</h1>
          <p id="todayDate">Daily Care Dashboard</p>
        </div>

        <div class="status-card">
          <strong>😊 Mood</strong>
          <div id="moodDisplay">Not set</div>
        </div>
      </div>

      <section class="section">
        <h2>Today's Summary</h2>

        <div class="summary-grid">
          <div class="summary-card"><span class="icon">☀️</span><strong id="wakeTime">—</strong><span>Wake Up</span></div>
          <div class="summary-card"><span class="icon">🍼</span><strong id="shakeCount">0</strong><span>Shakes</span></div>
          <div class="summary-card"><span class="icon">💧</span><strong id="waterCount">0 / 3</strong><span>Water Goal</span></div>
          <div class="summary-card"><span class="icon">🍎</span><strong id="foodCount">0</strong><span>Foods</span></div>
          <div class="summary-card"><span class="icon">💦</span><strong id="peeCount">0</strong><span>Pee</span></div>
          <div class="summary-card"><span class="icon">💩</span><strong id="poopyCount">0</strong><span>Poopy</span></div>

          <div class="summary-card routine-summary-card" id="miralaxCard">
            <span class="icon">🥤</span>
            <strong id="miralaxCount">0 / 3</strong>
            <span>Miralax</span>
          </div>

          <div class="summary-card routine-summary-card" id="enemaCard">
            <span class="icon">🧴</span>
            <strong id="enemaCount">0 / 2 wk</strong>
            <span id="enemaDays">None</span>
          </div>

          <div class="summary-card"><span class="icon">🌡</span><strong id="latestTemp">—</strong><span>Temp</span></div>
          <div class="summary-card med-summary-card" id="nextMedCard">
            <span class="icon">💊</span>
            <strong id="nextMedStatus">—</strong>
            <span id="nextMedDetails">Next Med</span>
          </div>

          <div class="summary-card supplies-summary-card" id="suppliesCard">
            <span class="icon">📦</span>
            <strong id="suppliesStatus">OK</strong>
            <span id="suppliesDetails">Supplies</span>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Quick Log</h2>

        <div class="quick-log">
          <div class="quick-group">
            <h3>🍼 Feeding</h3>
            <div class="quick-buttons">
              <button onclick="quickAdd('shake')">🍼 + Shake</button>
              <button onclick="quickAdd('water', '8 oz / 1 cup')">💧 + Water</button>
              <button onclick="openModal('food')">🍎 + Food</button>
            </div>
          </div>

          <div class="quick-group">
            <h3>💩 Diapers</h3>
            <div class="quick-buttons">
              <button onclick="quickAdd('pee')">💦 + Pee</button>
              <button onclick="quickAdd('poopy')">💩 + Poopy</button>
            </div>
          </div>

          <div class="quick-group">
            <h3>☀️ Daily Notes</h3>
            <div class="quick-buttons">
              <button onclick="openModal('wake')">☀️ + Wake Up</button>
              <button onclick="openModal('notes')">📝 + Note</button>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Today's Timeline</h2>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>
  </div>

  <button class="floating-add" onclick="openModal('quick')">+</button>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Modal</h2>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div id="modalContent"></div>
    </div>
  </div>
    <script src="./app.js?v=0.8.4" defer></script>
</body>
</html>
