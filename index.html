Date: June 16, 2026

- Added filtered hygiene timeline

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Caregiver Companion</title>

  <style>
    :root {
      --bg: #f8f6ff;
      --card: #ffffff;
      --primary: #5b35b1;
      --primary-dark: #21114d;
      --soft-purple: #eee7ff;
      --soft-green: #eaf8ef;
      --text: #1e1633;
      --muted: #6d6580;
      --border: #ddd7f0;
      --danger: #d9534f;
      --shadow: 0 10px 25px rgba(42, 25, 87, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, var(--primary-dark), #120a2e);
      color: white;
      padding: 24px 18px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      overflow-y: auto;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 28px;
      line-height: 1.2;
    }

    .nav button {
      width: 100%;
      border: none;
      background: transparent;
      color: white;
      text-align: left;
      padding: 13px 14px;
      border-radius: 12px;
      font-size: 0.98rem;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .nav button.active,
    .nav button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .main {
      margin-left: 260px;
      padding: 28px;
      width: calc(100% - 260px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 22px;
    }

    .title h1 { margin: 0; font-size: 2rem; }
    .title p { margin: 6px 0 0; color: var(--muted); }

    .status-card,
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .status-card {
      padding: 16px 20px;
      min-width: 180px;
      text-align: center;
    }

    .section {
      padding: 20px;
      margin-bottom: 20px;
    }

    .section h2 {
      margin-top: 0;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(110px, 1fr));
      gap: 12px;
    }

    .summary-card {
      background: #fafaff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
    }

    .summary-card .icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
    }

    .summary-card strong {
      display: block;
      font-size: 1.45rem;
      color: var(--primary-dark);
    }

    .summary-card span {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .quick-log {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .quick-group {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }

    .quick-group h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--primary-dark);
    }

    .quick-buttons,
    .favorite-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button,
    .primary-btn,
    .pill-btn {
      font: inherit;
    }

    .quick-buttons button,
    .primary-btn,
    .pill-btn {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #fff, var(--soft-purple));
      color: var(--primary);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
    }

    .quick-buttons button:hover,
    .primary-btn:hover,
    .pill-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 90px 40px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }

    .timeline-time {
      font-weight: bold;
      font-size: 0.9rem;
    }

    .timeline-icon {
      font-size: 1.3rem;
      text-align: center;
    }

    .delete-btn {
      border: none;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      font-size: 1rem;
    }

    .empty {
      color: var(--muted);
      padding: 16px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 14px;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(16, 10, 35, 0.45);
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 18px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
    }

    .modal-header h2 {
      margin: 0;
      color: var(--primary);
    }

    .close-btn {
      border: none;
      background: var(--soft-purple);
      color: var(--primary);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.2rem;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font: inherit;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .mini-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .mini-card {
      background: var(--soft-purple);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .mini-card strong {
      display: block;
      font-size: 1.35rem;
      color: var(--primary-dark);
    }

    .mini-card span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .progress-shell {
      background: #efeaf9;
      border-radius: 999px;
      overflow: hidden;
      height: 14px;
      margin: 10px 0 4px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.2s ease;
    }

    .favorite-chip {
      border: 1px solid var(--border);
      background: var(--soft-green);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--primary-dark);
      font-weight: bold;
    }

    .favorite-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .favorite-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .floating-add {
      position: fixed;
      right: 28px;
      bottom: 28px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 2.4rem;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(91, 53, 177, 0.4);
    }

    .mobile-menu-btn {
      display: none;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 1.2rem;
    }

    @media (max-width: 1050px) {
      .summary-grid { grid-template-columns: repeat(4, 1fr); }
      .quick-log { grid-template-columns: 1fr; }
      .mini-summary-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 800px) {
      .sidebar {
        transform: translateX(-100%);
        transition: 0.25s ease;
        z-index: 20;
      }

      .sidebar.open { transform: translateX(0); }

      .main {
        margin-left: 0;
        width: 100%;
        padding: 18px;
      }

      .mobile-menu-btn { display: inline-block; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }

      .timeline-item {
        grid-template-columns: 74px 32px 1fr auto;
      }

      .form-row,
      .mini-summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">💜 Caregiver<br>Companion</div>

      <nav class="nav">
        <button class="active" onclick="openModal('today')">🏠 Today</button>
        <button onclick="openModal('feeding')">🍼 Feeding & Hydration</button>
        <button onclick="openModal('diapers')">💩 Diapers</button>
        <button onclick="openModal('hygiene')">🪥 Hygiene</button>
        <button onclick="openModal('food')">🍎 Food Log</button>
        <button onclick="openModal('activity')">🚶 Activity & Positioning</button>
        <button onclick="openModal('health')">🌡 Health & Meds</button>
        <button onclick="openModal('appointments')">📅 Appointments</button>
        <button onclick="openModal('supplies')">📦 Supplies</button>
        <button onclick="openModal('notes')">📝 Concerns & Notes</button>
        <button onclick="openModal('contacts')">☎️ Contacts</button>
        <button onclick="openModal('reports')">📊 Reports</button>
        <button onclick="openModal('settings')">⚙️ Settings</button>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

        <div class="title">
          <h1>Muhammad 💜</h1>
          <p id="todayDate">Daily Care Dashboard</p>
        </div>

        <div class="status-card">
          <strong>😊 Mood</strong>
          <div id="moodDisplay">Not set</div>
        </div>
      </div>

      <section class="section">
        <h2>Today's Summary</h2>

        <div class="summary-grid">
          <div class="summary-card"><span class="icon">☀️</span><strong id="wakeTime">—</strong><span>Wake Up</span></div>
          <div class="summary-card"><span class="icon">🍼</span><strong id="shakeCount">0</strong><span>Shakes</span></div>
          <div class="summary-card"><span class="icon">💧</span><strong id="waterCount">0 / 3</strong><span>Water Goal</span></div>
          <div class="summary-card"><span class="icon">🍎</span><strong id="foodCount">0</strong><span>Foods</span></div>
          <div class="summary-card"><span class="icon">💦</span><strong id="peeCount">0</strong><span>Pee</span></div>
          <div class="summary-card"><span class="icon">💩</span><strong id="poopyCount">0</strong><span>Poopy</span></div>
          <div class="summary-card"><span class="icon">🪥</span><strong id="teethCount">0 / 2</strong><span>Teeth</span></div>
          <div class="summary-card"><span class="icon">🚿</span><strong id="bathStatus">No</strong><span>Bath</span></div>
        </div>
      </section>

      <section class="section">
        <h2>Quick Log</h2>

        <div class="quick-log">
          <div class="quick-group">
            <h3>🍼 Feeding</h3>
            <div class="quick-buttons">
              <button onclick="quickAdd('shake')">🍼 Shake</button>
              <button onclick="quickAdd('water', '8 oz / 1 cup')">💧 Water</button>
              <button onclick="openModal('food')">🍎 Food</button>
            </div>
          </div>

          <div class="quick-group">
            <h3>💩 Diapers</h3>
            <div class="quick-buttons">
              <button onclick="quickAdd('pee')">💦 Pee</button>
              <button onclick="quickAdd('poopy')">💩 Poopy</button>
            </div>
          </div>

          <div class="quick-group">
            <h3>☀️ Daily Notes</h3>
            <div class="quick-buttons">
              <button onclick="openModal('wake')">☀️ Wake Up</button>
              <button onclick="openModal('notes')">📝 Note</button>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Today's Timeline</h2>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>
  </div>

  <button class="floating-add" onclick="openModal('quick')">+</button>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Modal</h2>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "caregiverCompanion_v05";
    const FAVORITES_KEY = "caregiverCompanion_foodFavorites_v05";

    let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    let foodFavorites = JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [
      "Applesauce",
      "Yogurt",
      "Oatmeal",
      "Mashed Potatoes",
      "Pudding"
    ];

    const icons = {
      wake: "☀️",
      shake: "🍼",
      water: "💧",
      pee: "💦",
      poopy: "💩",
      food: "🍎",
      position: "🔄",
      walk: "🚶",
      exercise: "🏋️",
      teeth_morning: "🪥",
      teeth_evening: "🪥",
      full_bath: "🚿",
      sponge_bath: "🛁",
      nails: "✂️",
      haircut: "💇",
      medication: "💊",
      temperature: "🌡",
      note: "📝",
      mood: "😊"
    };

    const labels = {
      wake: "Wake Up",
      shake: "Shake",
      water: "Water",
      pee: "Pee Diaper",
      poopy: "Poopy Diaper",
      food: "Food",
      position: "Position Change",
      walk: "Walk",
      exercise: "Exercise",
      teeth_morning: "Morning Teeth Brushed",
      teeth_evening: "Evening Teeth Brushed",
      full_bath: "Full Bath",
      sponge_bath: "Sponge Bath",
      nails: "Nails Clipped",
      haircut: "Hair Cut",
      medication: "Medication",
      temperature: "Temperature",
      note: "Note",
      mood: "Mood"
    };

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function saveFavorites() {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(foodFavorites));
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function isToday(entry) {
      return entry.timestamp.slice(0, 10) === todayKey();
    }

    function todayEntries() {
      return entries
        .filter(isToday)
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    }

    function timeLabel(timestamp) {
      return new Date(timestamp).toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function dateShort(timestamp) {
      return new Date(timestamp).toLocaleDateString([], {
        month: "short",
        day: "numeric"
      });
    }

    function dateLabel() {
      const today = new Date();

      document.getElementById("todayDate").textContent =
        today.toLocaleDateString([], {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });
    }

    function countToday(type) {
      return todayEntries().filter(entry => entry.type === type).length;
    }

    function hasToday(type) {
      return todayEntries().some(entry => entry.type === type);
    }

    function latestToday(type) {
      return [...todayEntries()].reverse().find(entry => entry.type === type);
    }

    function latestEver(type) {
      return [...entries]
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
        .reverse()
        .find(entry => entry.type === type);
    }

    function firstToday(type) {
      return todayEntries().find(entry => entry.type === type);
    }

    function diaperEntries() {
      return todayEntries().filter(entry =>
        ["pee", "poopy"].includes(entry.type)
      );
    }

    function feedingEntries() {
      return todayEntries().filter(entry =>
        ["wake", "shake", "water", "food"].includes(entry.type)
      );
    }

    function hygieneEntries() {
      return todayEntries().filter(entry =>
        ["teeth_morning", "teeth_evening", "full_bath", "sponge_bath", "nails", "haircut"].includes(entry.type)
      );
    }

    function quickAdd(type, details = "", extra = {}) {
      entries.push({
        id: crypto.randomUUID(),
        type,
        details,
        timestamp: new Date().toISOString(),
        ...extra
      });

      save();
      render();

      if (document.getElementById("modalBackdrop").classList.contains("show")) {
        refreshOpenModal();
      }
    }

    function saveManualDiaper() {
      const diaperType = document.getElementById("diaperTypeInput").value;
      const timeInput = document.getElementById("diaperTimeInput").value;
      const notes = document.getElementById("diaperNotesInput").value.trim();

      if (!diaperType || !timeInput) return;

      saveManualTimedEntry(diaperType, timeInput, notes);
      openModal("diapers");
    }

    function saveManualHygiene() {
      const hygieneType = document.getElementById("hygieneTypeInput").value;
      const timeInput = document.getElementById("hygieneTimeInput").value;
      const notes = document.getElementById("hygieneNotesInput").value.trim();

      if (!hygieneType || !timeInput) return;

      saveManualTimedEntry(hygieneType, timeInput, notes);
      openModal("hygiene");
    }

    function saveManualTimedEntry(type, timeInput, details = "") {
      const today = new Date();
      const [hours, minutes] = timeInput.split(":");

      today.setHours(Number(hours));
      today.setMinutes(Number(minutes));
      today.setSeconds(0);
      today.setMilliseconds(0);

      entries.push({
        id: crypto.randomUUID(),
        type,
        details,
        timestamp: today.toISOString()
      });

      save();
      render();
    }

    function removeExistingWakeUp() {
      const existingWake = firstToday("wake");

      if (existingWake) {
        entries = entries.filter(entry => entry.id !== existingWake.id);
      }
    }

    function saveWakeUpNow() {
      removeExistingWakeUp();

      entries.push({
        id: crypto.randomUUID(),
        type: "wake",
        details: "",
        timestamp: new Date().toISOString()
      });

      save();
      render();
      closeModal();
    }

    function saveWakeUpManual() {
      const timeInput = document.getElementById("wakeTimeInput").value;

      if (!timeInput) return;

      removeExistingWakeUp();

      const today = new Date();
      const [hours, minutes] = timeInput.split(":");

      today.setHours(Number(hours));
      today.setMinutes(Number(minutes));
      today.setSeconds(0);
      today.setMilliseconds(0);

      entries.push({
        id: crypto.randomUUID(),
        type: "wake",
        details: "Manually entered",
        timestamp: today.toISOString()
      });

      save();
      render();
      closeModal();
    }

    function deleteEntry(id) {
      entries = entries.filter(entry => entry.id !== id);
      save();
      render();

      if (document.getElementById("modalBackdrop").classList.contains("show")) {
        refreshOpenModal();
      }
    }

    function renderSummary() {
      const wake = firstToday("wake");
      document.getElementById("wakeTime").textContent = wake ? timeLabel(wake.timestamp) : "—";

      document.getElementById("shakeCount").textContent = countToday("shake");
      document.getElementById("waterCount").textContent = `${countToday("water")} / 3`;
      document.getElementById("foodCount").textContent = countToday("food");
      document.getElementById("peeCount").textContent = countToday("pee");
      document.getElementById("poopyCount").textContent = countToday("poopy");

      const teethTotal = countToday("teeth_morning") + countToday("teeth_evening");
      document.getElementById("teethCount").textContent = `${teethTotal} / 2`;

      const bathDone = hasToday("full_bath")
        ? "Full"
        : hasToday("sponge_bath")
          ? "Sponge"
          : "No";

      document.getElementById("bathStatus").textContent = bathDone;

      const mood = latestToday("mood");
      document.getElementById("moodDisplay").textContent = mood ? mood.details : "Not set";
    }

    function renderTimeline() {
      const timeline = document.getElementById("timeline");
      const items = todayEntries();

      if (!items.length) {
        timeline.innerHTML = `<div class="empty">No entries yet today. Use Quick Log to start tracking.</div>`;
        return;
      }

      timeline.innerHTML = items.map(entry => timelineItemHTML(entry)).join("");
    }

    function timelineItemHTML(entry) {
      return `
        <div class="timeline-item">
          <div class="timeline-time">${timeLabel(entry.timestamp)}</div>
          <div class="timeline-icon">${icons[entry.type] || "•"}</div>
          <div>
            <strong>${labels[entry.type] || entry.type}</strong>
            ${entry.details ? `<br><span style="color: var(--muted);">${entry.details}</span>` : ""}
          </div>
          <button class="delete-btn" onclick="deleteEntry('${entry.id}')">×</button>
        </div>
      `;
    }

    function render() {
      dateLabel();
      renderSummary();
      renderTimeline();
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
    }

    let currentModal = null;

    function openModal(type) {
      currentModal = type;

      const modalData = getModalData(type);

      document.getElementById("modalTitle").textContent = modalData.title;
      document.getElementById("modalContent").innerHTML = modalData.html;
      document.getElementById("modalBackdrop").classList.add("show");
      document.getElementById("sidebar").classList.remove("open");
    }

    function refreshOpenModal() {
      if (!currentModal) return;

      const modalData = getModalData(currentModal);
      document.getElementById("modalTitle").textContent = modalData.title;
      document.getElementById("modalContent").innerHTML = modalData.html;
    }

    function closeModal() {
      currentModal = null;
      document.getElementById("modalBackdrop").classList.remove("show");
    }

    function getModalData(type) {
      const modals = {
        today: {
          title: "Today",
          html: `<p>The main dashboard shows today’s summary, quick log buttons, and automatic timeline.</p>`
        },

        wake: {
          title: "Record Wake Up",
          html: `
            <p style="color:var(--muted);">
              Record wake-up time using the current time, or enter the actual time if you forgot to log it earlier.

        quick: {
          title: "Quick Log",
          html: `
            <div class="quick-log" style="grid-template-columns: 1fr;">
              <div class="quick-group">
                <h3>🍼 Feeding</h3>
                <div class="quick-buttons">
                  <button onclick="quickAdd('shake')">🍼 Shake</button>
                  <button onclick="quickAdd('water', '8 oz / 1 cup')">💧 Water</button>
                  <button onclick="openModal('food')">🍎 Food</button>
                </div>
              </div>

              <div class="quick-group">
                <h3>💩 Diapers</h3>

              <div class="quick-group">
                <h3>☀️ Daily Notes</h3>

          `
        },

        feeding: {
          title: "Feeding & Hydration",
          html: feedingHydrationHTML()
        },

        diapers: {
          title: "Diapers",
          html: diapersHTML()
        },

        hygiene: {
          title: "Hygiene",
          html: hygieneHTML()
        },

        food: {
          title: "Add Food",
          html: foodFormHTML()
        },

        foodFavorites: {
          title: "Edit Favorite Foods",
          html: foodFavoritesHTML()
        },

        activity: {
          title: "Activity & Positioning",
          html: `
            <div class="quick-buttons">
              <button onclick="quickAdd('position')">🔄 Position Change</button>
              <button onclick="quickAdd('walk')">🚶 Walk</button>
              <button onclick="quickAdd('exercise')">🏋️ Exercise</button>
            </div>
          `
        },

        health: {
          title: "Health & Meds",
          html: healthFormHTML()
        },

        appointments: {
          title: "Appointments",
          html: `
            <p>This section will track doctor, dentist, ALTCS, therapy, and next appointment notes.</p>
            <textarea placeholder="Appointment notes..."></textarea>
            <button class="primary-btn" style="margin-top:12px;" onclick="quickAdd('note', 'Appointment note added')">Save Appointment Note</button>
          `
        },

        supplies: {
          title: "Supplies",
          html: `
            <p>Supply inventory will go here next: enemas, diapers, gloves, bottles, nipples, clothes, and reorder reminders.</p>
          `
        },

        notes: {
          title: "Concerns & Notes",
          html: noteFormHTML()
        },

        contacts: {
          title: "Doctors & Contacts",
          html: `
            <p>Contact list will go here next: doctors, dentist, ALTCS, pharmacy, and suppliers.</p>
          `
        },

        reports: {
          title: "Reports",
          html: `
            <p><strong>Reports are coming next.</strong></p>
            <p>Today has ${todayEntries().length} timestamped entries.</p>
          `
        },

        settings: {
          title: "Settings",
          html: `
            <p><strong>Data Storage:</strong> This version saves only on this device using localStorage.</p>
            <button class="primary-btn" onclick="clearAllData()">Clear All Data</button>
          `
        }
      };

      return modals[type];
    }

    function hygieneHTML() {
      const teethTotal = countToday("teeth_morning") + countToday("teeth_evening");
      const bath = hasToday("full_bath") ? "Full" : hasToday("sponge_bath") ? "Sponge" : "No";
      const lastNails = latestEver("nails");
      const lastHaircut = latestEver("haircut");
      const items = hygieneEntries();

      return `
        <div class="mini-summary-grid">
          <div class="mini-card">
            <strong>${teethTotal} / 2</strong>
            <span>Teeth Today</span>
          </div>

          <div class="mini-card">
            <strong>${bath}</strong>
            <span>Bath Today</span>
          </div>

          <div class="mini-card">
            <strong>${lastNails ? dateShort(lastNails.timestamp) : "—"}</strong>
            <span>Last Nails</span>
          </div>

          <div class="mini-card">
            <strong>${lastHaircut ? dateShort(lastHaircut.timestamp) : "—"}</strong>
            <span>Last Haircut</span>
          </div>
        </div>

        <div class="section" style="box-shadow:none;">
          <h2>Quick Add</h2>
          <div class="quick-buttons">
            <button onclick="quickAdd('teeth_morning')">🪥 Morning Teeth</button>
            <button onclick="quickAdd('teeth_evening')">🪥 Evening Teeth</button>
            <button onclick="quickAdd('full_bath')">🚿 Full Bath</button>
            <button onclick="quickAdd('sponge_bath')">🛁 Sponge Bath</button>
            <button onclick="quickAdd('nails')">✂️ Nails Clipped</button>
            <button onclick="quickAdd('haircut')">💇 Hair Cut</button>
          </div>
        </div>

        <div class="section" style="box-shadow:none;">
          <h2>Manual Hygiene Entry</h2>

          <div class="form-row">
            <div>
              <label for="hygieneTypeInput">Type</label>
              <select id="hygieneTypeInput">
                <option value="teeth_morning">Morning Teeth</option>
                <option value="teeth_evening">Evening Teeth</option>
                <option value="full_bath">Full Bath</option>
                <option value="sponge_bath">Sponge Bath</option>
                <option value="nails">Nails Clipped</option>
                <option value="haircut">Hair Cut</option>
              </select>
            </div>

            <div>
              <label for="hygieneTimeInput">Time</label>
              <input id="hygieneTimeInput" type="time" />
            </div>
          </div>

          <label for="hygieneNotesInput">Notes</label>
          <textarea id="hygieneNotesInput" placeholder="Optional notes..."></textarea>

          <button class="primary-btn" style="margin-top:14px;" onclick="saveManualHygiene()">
            Save Hygiene Entry
          </button>
        </div>

        <div class="section" style="box-shadow:none; margin-bottom:0;">
          <h2>Hygiene Timeline</h2>
          <div class="timeline">
            ${
              items.length
                ? items.map(entry => timelineItemHTML(entry)).join("")
                : `<div class="empty">No hygiene entries yet today.</div>`
            }
          </div>
        </div>
      `;
    }

    function diapersHTML() {
      const peeCount = countToday("pee");
      const poopyCount = countToday("poopy");
      const lastPee = latestToday("pee");
      const lastPoopy = latestToday("poopy");
      const items = diaperEntries();

      return `
        <div class="mini-summary-grid">
          <div class="mini-card"><strong>${peeCount}</strong><span>Pee Diapers</span></div>
          <div class="mini-card"><strong>${poopyCount}</strong><span>Poopy Diapers</span></div>
          <div class="mini-card"><strong>${lastPee ? timeLabel(lastPee.timestamp) : "—"}</strong><span>Last Pee</span></div>
          <div class="mini-card"><strong>${lastPoopy ? timeLabel(lastPoopy.timestamp) : "—"}</strong><span>Last Poopy</span></div>
        </div>

        <div class="section" style="box-shadow:none;">
          <h2>Quick Add</h2>
          <div class="quick-buttons">
            <button onclick="quickAdd('pee')">💦 Add Pee</button>
            <button onclick="quickAdd('poopy')">💩 Add Poopy</button>
          </div>
        </div>

        <div class="section" style="box-shadow:none;">
          <h2>Manual Diaper Entry</h2>

          <div class="form-row">
            <div>
              <label for="diaperTypeInput">Type</label>
              <select id="diaperTypeInput">
                <option value="pee">Pee</option>
                <option value="poopy">Poopy</option>
              </select>
            </div>

            <div>
              <label for="diaperTimeInput">Time</label>
              <input id="diaperTimeInput" type="time" />
            </div>
          </div>

          <label for="diaperNotesInput">Notes</label>
          <textarea id="diaperNotesInput" placeholder="Optional notes..."></textarea>

          <button class="primary-btn" style="margin-top:14px;" onclick="saveManualDiaper()">
            Save Diaper Entry
          </button>
        </div>

        <div class="section" style="box-shadow:none; margin-bottom:0;">
          <h2>Diaper Timeline</h2>
          <div class="timeline">
            ${
              items.length
                ? items.map(entry => timelineItemHTML(entry)).join("")
                : `<div class="empty">No diaper entries yet today.</div>`
            }
          </div>
        </div>
      `;
    }

    function feedingHydrationHTML() {
      const wake = firstToday("wake");
      const waterCount = countToday("water");
      const waterPercent = Math.min((waterCount / 3) * 100, 100);
      const feedItems = feedingEntries();

      return `
        <div class="mini-summary-grid">
          <div class="mini-card"><strong>${wake ? timeLabel(wake.timestamp) : "—"}</strong><span>Wake Up</span></div>
          <div class="mini-card"><strong>${countToday("shake")}</strong><span>Shakes</span></div>
          <div class="mini-card"><strong>${waterCount} / 3</strong><span>Water Cups</span></div>
          <div class="mini-card"><strong>${countToday("food")}</strong><span>Foods Logged</span></div>
        </div>

        <div class="section" style="box-shadow:none;">
          <h2>Quick Add</h2>
          <div class="quick-buttons">
            <button onclick="openModal('wake')">☀️ Wake Up</button>
            <button onclick="quickAdd('shake')">🍼 Add Shake</button>
            <button onclick="quickAdd('water', '8 oz / 1 cup')">💧 Add Water</button>
            <button onclick="openModal('food')">🍎 Add Food</button>
          </div>
        </div>

        <div class="section" style="box-shadow:none;">
          <h2>Water Goal</h2>
          <strong>${waterCount} / 3 cups</strong>
          <div class="progress-shell">
            <div class="progress-fill" style="width:${waterPercent}%;"></div>
          </div>
          <p style="color:var(--muted); margin-bottom:0;">
            Each water tap records 8 oz / 1 cup.
          </p>
        </div>

        <div class="section" style="box-shadow:none; margin-bottom:0;">
          <h2>Feeding Timeline</h2>
          <div class="timeline">
            ${
              feedItems.length
                ? feedItems.map(entry => timelineItemHTML(entry)).join("")
                : `<div class="empty">No feeding or hydration entries yet today.</div>`
            }
          </div>
        </div>
      `;
    }

    function foodFormHTML() {
      return `
        <label for="foodInput">Food Given</label>
        <input id="foodInput" placeholder="Example: Applesauce" />

        <div class="favorite-wrap">
          ${foodFavorites.map(food => `
            <button class="favorite-chip" onclick="setFoodFavorite('${escapeJS(food)}')">${food}</button>
          `).join("")}
        </div>

        <label for="foodNotes">Notes</label>
        <textarea id="foodNotes" placeholder="Example: Ate well, refused, small amount..."></textarea>

        <button class="primary-btn" style="margin-top:14px;" onclick="saveFood()">Save Food Entry</button>

        <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">

        <button class="pill-btn" onclick="openModal('foodFavorites')">⚙️ Edit Favorite Foods</button>
      `;
    }

    function setFoodFavorite(food) {
      document.getElementById("foodInput").value = food;
    }

    function saveFood() {
      const food = document.getElementById("foodInput").value.trim();
      const notes = document.getElementById("foodNotes").value.trim();

      if (!food) return;

      entries.push({
        id: crypto.randomUUID(),
        type: "food",
        food,
        details: notes ? `${food} — ${notes}` : food,
        notes,
        timestamp: new Date().toISOString()
      });

      save();
      render();
      openModal("feeding");
    }

    function foodFavoritesHTML() {
      return `
        <label for="newFavoriteInput">Add Favorite Food</label>
        <input id="newFavoriteInput" placeholder="Example: Scrambled eggs" />

        <button class="primary-btn" style="margin-top:12px;" onclick="addFoodFavorite()">Add Favorite</button>

        <div class="favorite-list">
          ${
            foodFavorites.length
              ? foodFavorites.map((food, index) => `
                  <div class="favorite-row">
                    <strong>${food}</strong>
                    <button class="delete-btn" onclick="deleteFoodFavorite(${index})">×</button>
                  </div>
                `).join("")
              : `<div class="empty">No favorite foods yet.</div>`
          }
        </div>

        <button class="pill-btn" style="margin-top:16px;" onclick="openModal('food')">Back to Food Entry</button>
      `;
    }

    function addFoodFavorite() {
      const input = document.getElementById("newFavoriteInput");
      const value = input.value.trim();

      if (!value) return;

      foodFavorites.push(value);
      saveFavorites();
      openModal("foodFavorites");
    }

    function deleteFoodFavorite(index) {
      foodFavorites.splice(index, 1);
      saveFavorites();
      openModal("foodFavorites");
    }

    function noteFormHTML() {
      return `
        <label for="noteInput">Concern or Note</label>
        <textarea id="noteInput" placeholder="Write anything you want to remember..."></textarea>

        <label for="moodInput">Mood Today</label>
        <select id="moodInput">
          <option value="">Select mood</option>
          <option>Great</option>
          <option>Good</option>
          <option>Okay</option>
          <option>Fussy</option>
          <option>Tired</option>
          <option>Sick</option>
        </select>

        <button class="primary-btn" style="margin-top:14px;" onclick="saveNote()">Save</button>
      `;
    }

    function saveNote() {
      const note = document.getElementById("noteInput").value.trim();
      const mood = document.getElementById("moodInput").value;

      if (note) quickAdd("note", note);
      if (mood) quickAdd("mood", mood);

      closeModal();
    }

    function healthFormHTML() {
      return `
        <div class="form-row">
          <div>
            <label for="tempInput">Temperature</label>
            <input id="tempInput" placeholder="Example: 99.1" />
          </div>

          <div>
            <label for="medInput">Medication</label>
            <input id="medInput" placeholder="Example: Tylenol 5 mL" />
          </div>
        </div>

        <label for="healthNotes">Health Notes</label>
        <textarea id="healthNotes" placeholder="Symptoms, sick notes, cough, congestion, etc."></textarea>

        <button class="primary-btn" style="margin-top:14px;" onclick="saveHealth()">Save Health Entry</button>
      `;
    }

    function saveHealth() {
      const temp = document.getElementById("tempInput").value.trim();
      const med = document.getElementById("medInput").value.trim();
      const notes = document.getElementById("healthNotes").value.trim();

      if (temp) quickAdd("temperature", `${temp}°F`);
      if (med) quickAdd("medication", med);
      if (notes) quickAdd("note", notes);

      closeModal();
    }

    function clearAllData() {
      if (!confirm("Clear all saved caregiver entries on this device?")) return;

      entries = [];
      save();
      render();
      closeModal();
    }

    function escapeJS(str) {
      return String(str)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'");
    }

    render();
  </script>
</body>
</html>
